base_config: vae_balanced.yaml

run_name: vae_balanced_8d

data:
  T: 16000
  scale: 0.22
  clip_range: [-5.0, 5.0]
  segment_tries: 48
  segment_top_k: 8
  max_resample: 6
  min_energy: 0.0001
  random_segment_prob: 0.15
  search_window_seconds: 5.0
  augmentation:
    enabled: true
    gain_range: [0.8, 1.2]
    noise_std: 0.02
    shift_max: 192
    dropout_prob: 0.35
    dropout_width: 192

model:
  latent_dim: 8
  channels: [48, 96, 192, 256]
  first_kernel: 31
  kernel_size: 11

training:
  batch_size: 8

loss:
  amplitude_weight: 0.35
  clamp_range: 5.0
  use_multiscale_stft_loss: true
  recon_time_weight: 1.4
  stft_scales: [64, 128, 256, 512, 1024]
  stft_hop_lengths: [16, 32, 64, 128, 256]
  stft_win_lengths: [64, 128, 256, 512, 1024]
  stft_scale_weights: [1.1, 1.0, 0.9, 0.7, 0.5]
  stft_linear_weight: 0.06
  stft_log_weight: 0.08

kl:
  free_bits: 0.2
  beta_max: 0.001
  n_cycles: 4

validation:
  deterministic_vae: true
