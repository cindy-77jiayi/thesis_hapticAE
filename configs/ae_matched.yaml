# Deterministic AE with SAME architecture as vae_balanced
# Purpose: reconstruction quality upper bound (no KL penalty)
# Compare with vae_balanced to quantify the "cost of controllability"

seed: 42
model_type: ae
run_name: ae_matched

data:
  sr: 8000
  T: 80000
  scale: 1.0
  extensions: [".flac", ".wav"]
  segment_mode: hapticgen
  normalize_mode: none
  min_segment_ratio: 1.0
  clip_range: null
  use_minmax: false
  train_split: 0.8
  analysis_batch_size: 4

model:
  latent_dim: 24
  channels: [32, 64, 128, 128]
  first_kernel: 25
  kernel_size: 9
  activation: leaky_relu
  norm: group

training:
  batch_size: 4
  epochs: 200
  patience: 30
  min_delta: 0.0001
  early_stop_start: 20
  grad_clip: 1.0
  print_every: 10

optimizer:
  lr: 0.0002
  weight_decay: 0.00001

scheduler:
  factor: 0.5
  patience: 20

loss:
  l1_weight: 0.2
  stft_loss_weight: 0.15
  amplitude_weight: 0.7
  clamp_range: 3.0
