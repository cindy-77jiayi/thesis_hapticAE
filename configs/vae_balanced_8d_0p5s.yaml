seed: 42
model_type: vae
run_name: vae_balanced_8d_0p5s

data:
  sr: 8000
  T: 4000
  scale: 0.25
  use_minmax: false
  train_split: 0.8
  clip_range: [-5.0, 5.0]
  segment_tries: 48
  segment_top_k: 4
  max_resample: 6
  min_energy: 0.0001
  random_segment_prob: 0.0
  search_window_seconds: 5.0
  augmentation:
    enabled: false
    gain_range: [0.8, 1.2]
    noise_std: 0.0
    shift_max: 16
    dropout_prob: 0.0
    dropout_width: 0

model:
  latent_dim: 8
  channels: [48, 96, 192, 256]
  first_kernel: 31
  kernel_size: 11
  activation: leaky_relu
  norm: group
  logvar_clip: [-10.0, 10.0]

training:
  batch_size: 16
  epochs: 200
  patience: 15
  min_delta: 0.001
  early_stop_start: 20
  grad_clip: 1.0
  print_every: 5
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null

optimizer:
  lr: 0.0002
  weight_decay: 0.00005

scheduler:
  factor: 0.5
  patience: 20

ema:
  use: true
  decay: 0.999

checkpoint:
  save_last: true
  save_best: true
  save_every: 0
  keep_last: 0

validation:
  sample_every: 0
  n_samples: 4
  deterministic_vae: true

loss:
  l1_weight: 0.2
  spectral_weight: 0.15
  amplitude_weight: 0.6
  fft_weight: 0.0
  delta_weight: 0.1
  delta_use_l1: true
  clamp_range: 4.0
  use_multiscale_stft_loss: true
  recon_time_weight: 2.0
  stft_scales: [32, 64, 128, 256]
  stft_hop_lengths: [8, 16, 32, 64]
  stft_win_lengths: [32, 64, 128, 256]
  stft_scale_weights: [1.2, 1.1, 1.0, 0.8]
  stft_linear_weight: 0.04
  stft_log_weight: 0.04
  stft_eps: 0.0000001

kl:
  free_bits: 0.05
  beta_max: 0.0003
  n_cycles: 2
  ratio: 0.5
