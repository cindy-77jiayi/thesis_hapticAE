seed: 42
model_type: vae
run_name: vae_balanced_8d_0p5s

data:
  sr: 8000
  T: 4000
  scale: 0.25
  use_minmax: false
  train_split: 0.8
  clip_range: [-5.0, 5.0]
  segment_tries: 96
  segment_top_k: 1
  max_resample: 6
  min_energy: 0.0001
  random_segment_prob: 0.0
  search_window_seconds: 5.0
  augmentation:
    enabled: true
    gain_range: [0.8, 1.2]
    noise_std: 0.0
    shift_max: 64
    dropout_prob: 0.0
    dropout_width: 0

model:
  latent_dim: 12
  channels: [64, 128, 256, 256]
  first_kernel: 31
  kernel_size: 11
  activation: leaky_relu
  norm: group
  logvar_clip: [-10.0, 10.0]

training:
  batch_size: 16
  epochs: 600
  patience: 60
  min_delta: 0.005
  early_stop_start: 20
  grad_clip: 1.0
  print_every: 20
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null

optimizer:
  lr: 0.0003
  weight_decay: 0.00002

scheduler:
  factor: 0.5
  patience: 30

ema:
  use: true
  decay: 0.999

checkpoint:
  save_last: true
  save_best: true
  save_every: 0
  keep_last: 0

validation:
  sample_every: 0
  n_samples: 4
  deterministic_vae: true

loss:
  l1_weight: 0.3
  spectral_weight: 0.15
  amplitude_weight: 0.25
  fft_weight: 0.0
  delta_weight: 0.15
  delta_use_l1: true
  clamp_range: 3.0
  use_multiscale_stft_loss: true
  recon_time_weight: 2.5
  stft_scales: [32, 64, 128, 256]
  stft_hop_lengths: [8, 16, 32, 64]
  stft_win_lengths: [32, 64, 128, 256]
  stft_scale_weights: [1.6, 1.3, 0.9, 0.5]
  stft_linear_weight: 0.06
  stft_log_weight: 0.03
  stft_eps: 0.0000001

kl:
  free_bits: 0.03
  beta_max: 0.0002
  n_cycles: 1
  ratio: 0.7
