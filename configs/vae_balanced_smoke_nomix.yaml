# Smoke-test preset (fast sanity check, no mixing augmentation).

seed: 42
model_type: vae
run_name: vae_balanced_smoke_nomix

data:
  sr: 8000
  T: 4000
  scale: 0.25
  use_minmax: false
  train_split: 0.8
  use_mixing_augmentation: false
  mixing_probability: 0.0
  mixing_gain_min: 0.2
  mixing_gain_max: 0.8
  mixing_offset_enabled: true
  mixing_offset_min: -400
  mixing_offset_max: 400
  mixing_normalize_enabled: true
  mixing_normalize_peak_target: 3.0
  mixing_clip_min: -3.0
  mixing_clip_max: 3.0

model:
  latent_dim: 20
  channels: [32, 64, 128, 128]
  first_kernel: 25
  kernel_size: 9
  activation: leaky_relu
  norm: group
  logvar_clip: [-10.0, 10.0]

training:
  batch_size: 32
  epochs: 5
  patience: 2
  min_delta: 0.0001
  early_stop_start: 2
  grad_clip: 1.0
  print_every: 1

optimizer:
  lr: 0.0002
  weight_decay: 0.00001

scheduler:
  factor: 0.5
  patience: 2

loss:
  l1_weight: 0.2
  spectral_weight: 0.15
  amplitude_weight: 0.7
  clamp_range: 3.0

kl:
  free_bits: 0.5
  beta_max: 0.003
  n_cycles: 2
  ratio: 0.5
