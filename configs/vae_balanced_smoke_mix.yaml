# Quick smoke run for full-mix setup (includes data/external_waveforms if present).
# Run with --data_dir . so data_dirs resolve from repo root.

seed: 42
model_type: vae
run_name: vae_balanced_smoke_mix

data:
  data_dirs:
    - hapticgen-dataset
    - data/external_waveforms
  sr: 8000
  T: 8000
  scale: 0.25
  use_minmax: false
  train_split: 0.8
  accepted_models: ["HapticGen", "HapticGen-Initial", "Baseline-AudioGen", "ExternalWaveform"]
  accepted_votes: [1]
  segment_tries: 24
  segment_min_energy: 0.0004
  segment_max_resample: 4
  segment_topk_ratio: 0.35
  segment_peak_pick_prob: 0.65

model:
  latent_dim: 24
  channels: [32, 64, 128, 128]
  first_kernel: 25
  kernel_size: 9
  activation: leaky_relu
  norm: group
  logvar_clip: [-10.0, 10.0]

training:
  batch_size: 32
  epochs: 20
  patience: 6
  min_delta: 0.0001
  early_stop_start: 4
  grad_clip: 1.0
  print_every: 2

optimizer:
  lr: 0.0002
  weight_decay: 0.00001

scheduler:
  factor: 0.5
  patience: 4

loss:
  l1_weight: 0.2
  spectral_weight: 0.15
  amplitude_weight: 0.7
  clamp_range: 3.0

kl:
  free_bits: 0.5
  beta_max: 0.003
  n_cycles: 1
  ratio: 0.5

