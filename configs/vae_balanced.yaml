# VAE config balancing reconstruction quality and PCA structure
# Trade-off between vae_default (good recon, bad PCA) and vae_compact (bad recon, good PCA)
#   - latent_dim: 24 (middle ground: enough capacity, compact enough for PCA)
#   - beta_max: 0.003 (moderate KL: structured but not over-compressed)
# Expected: PCA 8 PCs ≈ 55-60%, reconstruction STD ratio ≈ 65-75%

seed: 42
model_type: vae
run_name: vae_balanced

data:
  sr: 8000
  T: 4000
  scale: 0.25
  use_minmax: false
  train_split: 0.8

model:
  latent_dim: 20
  channels: [32, 64, 128, 128]
  first_kernel: 25
  kernel_size: 9
  activation: leaky_relu
  norm: group
  logvar_clip: [-10.0, 10.0]

training:
  batch_size: 32
  epochs: 200
  patience: 30
  min_delta: 0.0001
  early_stop_start: 20
  grad_clip: 1.0
  print_every: 10

optimizer:
  lr: 0.0002
  weight_decay: 0.00001

scheduler:
  factor: 0.5
  patience: 20

loss:
  l1_weight: 0.2
  spectral_weight: 0.15
  amplitude_weight: 0.7
  clamp_range: 3.0
  # Optional configurable multi-scale STFT path (off keeps legacy behavior).
  use_multiscale_stft_loss: True
  recon_time_weight: 1.8
  stft_scales: [128, 256, 512, 1024]
  stft_hop_lengths: [32, 64, 128, 256]
  stft_win_lengths: [128, 256, 512, 1024]
  stft_scale_weights: [1.0, 1.0, 0.8, 0.6]
  stft_linear_weight: 0.02
  stft_log_weight: 0.04
  stft_eps: 0.0000001

kl:
  free_bits: 0.5
  beta_max: 0.003
  n_cycles: 2
  ratio: 0.5
