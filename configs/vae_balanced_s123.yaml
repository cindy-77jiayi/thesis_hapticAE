# Cross-seed stability test: same architecture, seed 123
seed: 123
model_type: vae
run_name: vae_balanced_s123

data:
  sr: 8000
  T: 80000
  scale: 1.0
  extensions: [".flac", ".wav"]
  segment_mode: hapticgen
  normalize_mode: none
  min_segment_ratio: 1.0
  clip_range: null
  use_minmax: false
  train_split: 0.8
  analysis_batch_size: 4
  val_random_seek: false
  val_sample_with_replacement: false

model:
  latent_dim: 20
  channels: [32, 64, 128, 128]
  first_kernel: 25
  kernel_size: 9
  activation: leaky_relu
  norm: group
  logvar_clip: [-10.0, 10.0]

training:
  batch_size: 4
  epochs: 200
  patience: 30
  min_delta: 0.0001
  early_stop_start: 20
  grad_clip: 1.0
  print_every: 10

optimizer:
  lr: 0.0002
  weight_decay: 0.00001

scheduler:
  factor: 0.5
  patience: 20

loss:
  l1_weight: 0.2
  stft_loss_weight: 1.0
  amplitude_weight: 0.7
  clamp_range: 3.0
  recon_time_weight: 1.8
  stft_scales: [128, 256, 512, 1024]
  stft_hop_lengths: [32, 64, 128, 256]
  stft_win_lengths: [128, 256, 512, 1024]
  stft_scale_weights: [1.0, 1.0, 0.8, 0.6]
  stft_linear_weight: 0.02
  stft_log_weight: 0.04
  stft_eps: 0.0000001

kl:
  free_bits: 0.5
  beta_max: 0.003
  n_cycles: 2
  ratio: 0.5
